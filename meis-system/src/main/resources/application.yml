server:
  max-http-request-header-size: 64KB
  port: 8083
spring:
  application:
    name: meis-system
  flyway:
    enabled: false
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:43.138.177.53}:${POSTGRES_PORT:5432}/${POSTGRES_DB:meis}
    username: ${POSTGRES_USER:med}
    password: ${POSTGRES_PASSWORD:med123456}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
      connect-timeout: 2s
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
meis:
  jwt:
    secret: meis-saas-jwt-secret-change-in-production-256bits
    issuer: meis-saas
    expiration-ms: 86400000
  cache:
    enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health,info