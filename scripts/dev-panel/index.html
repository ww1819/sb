<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MEIS 开发控制面板</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --ok: #3dd68c;
      --down: #5c6b80;
      --warn: #f5a524;
      --err: #f31260;
      --accent: #5b8def;
      --accent-hover: #7aa3f5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(180deg, #151d2b, var(--bg));
    }
    h1 { margin: 0; font-size: 1.35rem; font-weight: 600; }
    .sub { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; }
    button {
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.15s, border-color 0.15s;
    }
    button:hover:not(:disabled) { background: #243044; border-color: #4a5f7a; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.primary:hover:not(:disabled) { background: var(--accent-hover); }
    button.danger { border-color: #7a3048; color: #ffb4c8; }
    button.warn { border-color: #6b5520; color: #ffd88a; }
    main { padding: 20px 24px 40px; max-width: 1680px; margin: 0 auto; }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
    }
    .stat .label { color: var(--muted); font-size: 0.78rem; }
    .stat .value { font-size: 1.4rem; font-weight: 600; margin-top: 4px; }
    .section-title {
      font-size: 0.95rem;
      color: var(--muted);
      margin: 24px 0 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    th, td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    th { background: #1f2a3d; color: var(--muted); font-weight: 500; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(91, 141, 239, 0.06); }
    .dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .dot.up { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
    .dot.down { background: var(--down); }
    .dot.debug { background: var(--warn); box-shadow: 0 0 6px var(--warn); }
    .actions { display: flex; flex-wrap: wrap; gap: 4px; }
    .actions button { padding: 4px 8px; font-size: 0.78rem; border-radius: 6px; }
    .actions button.hot-reload {
      border-color: #6b5520;
      color: #ffd88a;
    }
    .actions button.hot-reload.loading {
      opacity: 0.65;
      cursor: wait;
      color: var(--warn);
    }
    .actions button.hot-reload.ok-flash {
      border-color: var(--ok);
      color: #b8f5c8;
    }
    .actions button.hot-reload.fail-flash {
      border-color: var(--err);
      color: #ffb4b4;
    }
    .hot-reload-status {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 0.72rem;
      margin-left: 2px;
      white-space: nowrap;
      vertical-align: middle;
    }
    .hot-reload-status.ok { color: var(--ok); }
    .hot-reload-status.fail { color: var(--err); }
    .hot-reload-status.running { color: var(--warn); }
    .log-watch {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    .log-watch input { cursor: pointer; }
    .svc-name { font-weight: 600; }
    .svc-id { color: var(--muted); font-size: 0.76rem; margin-top: 2px; }
    .svc-desc { color: var(--muted); font-size: 0.8rem; line-height: 1.4; max-width: 220px; }
    .jar-meta { font-size: 0.74rem; color: var(--muted); margin-top: 2px; }
    .build-opts {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 140px;
    }
    .build-section {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .build-section + .build-section {
      padding-top: 8px;
      border-top: 1px solid rgba(45, 58, 79, 0.55);
    }
    .build-section-label {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .build-opt {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.76rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }
    .build-opt input { cursor: pointer; }
    .build-mode-select {
      background: #0f1419;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 6px;
      font-size: 0.76rem;
      width: 100%;
      cursor: pointer;
    }
    .build-mode-hint {
      font-size: 0.7rem;
      color: var(--muted);
      line-height: 1.35;
    }
    .build-opts-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .build-opts-actions button {
      padding: 3px 8px;
      font-size: 0.74rem;
      border-radius: 5px;
    }
    .mono { font-family: Consolas, monospace; font-size: 0.82rem; }
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      max-width: 420px;
      padding: 12px 16px;
      border-radius: 10px;
      background: #243044;
      border: 1px solid var(--border);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 100;
      display: none;
      font-size: 0.88rem;
    }
    .toast.show { display: block; }
    .toast.err { border-color: var(--err); color: #ffb4c8; }
    .toast.ok { border-color: var(--ok); }
    .log-panel {
      margin-top: 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
    }
    .log-panel h3 { margin: 0 0 8px; font-size: 0.9rem; color: var(--muted); }
    .log-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .log-toolbar label {
      font-size: 0.8rem;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .log-toolbar select {
      background: #0f1419;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 0.82rem;
    }
    .log-meta {
      font-size: 0.78rem;
      color: var(--muted);
      margin-left: auto;
    }
    .log-console {
      margin: 0;
      max-height: 420px;
      overflow: auto;
      font-size: 0.78rem;
      line-height: 1.5;
      background: #0b1018;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: Consolas, "Cascadia Mono", monospace;
    }
    .log-line {
      display: grid;
      grid-template-columns: 148px 130px 56px 1fr;
      gap: 8px;
      padding: 4px 10px;
      border-bottom: 1px solid rgba(45, 58, 79, 0.45);
      word-break: break-word;
      cursor: pointer;
    }
    .log-line.log-header { cursor: default; }
    .log-line.log-active { background: rgba(91, 141, 239, 0.18); outline: 1px solid rgba(91, 141, 239, 0.35); }
    .log-line:hover:not(.log-header) { background: rgba(91, 141, 239, 0.12); }
    .log-line .msg-preview { color: #c5d0e0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .log-line .ts { color: #7d8fa8; }
    .log-line .svc { color: #8eb4ff; }
    .log-line .lvl { font-weight: 600; }
    .log-line.lvl-ERROR .lvl, .log-line.lvl-ERROR .msg { color: #ff6b8a; }
    .log-line.lvl-WARN .lvl, .log-line.lvl-WARN .msg { color: #ffc857; }
    .log-line.lvl-INFO .lvl { color: #6eb5ff; }
    .log-line.lvl-EVENT .lvl, .log-line.lvl-EVENT .msg { color: #b388ff; }
    .log-line .msg { color: #c5d0e0; white-space: pre-wrap; }
    .log-empty { padding: 24px; text-align: center; color: var(--muted); }
    .log-drawer-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 200;
      display: none;
    }
    .log-drawer-backdrop.open { display: block; }
    .log-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(720px, 92vw);
      height: 100vh;
      background: #121a28;
      border-left: 1px solid var(--border);
      box-shadow: -8px 0 32px rgba(0, 0, 0, 0.45);
      z-index: 201;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.2s ease;
    }
    .log-drawer.open { transform: translateX(0); }
    .log-drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: #1a2332;
    }
    .log-drawer-tabs { display: flex; gap: 6px; }
    .log-drawer-tabs button {
      padding: 6px 10px;
      font-size: 0.8rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }
    .log-drawer-tabs button.active {
      background: rgba(91, 141, 239, 0.2);
      border-color: var(--accent);
      color: var(--text);
    }
    .log-drawer-meta {
      padding: 10px 14px;
      font-size: 0.8rem;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      line-height: 1.5;
    }
    .log-drawer-body {
      flex: 1;
      margin: 0;
      padding: 14px;
      overflow: auto;
      font-family: Consolas, "Cascadia Mono", monospace;
      font-size: 0.8rem;
      line-height: 1.55;
      color: #d4deec;
      white-space: pre-wrap;
      word-break: break-word;
      background: #0b1018;
    }
    .log-drawer-footer {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      background: #1a2332;
    }
    .log-drawer-footer input {
      flex: 1;
      min-width: 140px;
      background: #0f1419;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 0.8rem;
    }
    .log-drawer-hint {
      font-size: 0.75rem;
      color: var(--muted);
      padding: 0 0 8px;
    }
    .log-svc-filter-wrap { position: relative; }
    .log-svc-filter-wrap > button {
      min-width: 148px;
      text-align: left;
      font-size: 0.82rem;
    }
    .log-svc-menu {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      z-index: 50;
      min-width: 280px;
      max-height: 320px;
      overflow: auto;
      background: #1a2332;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.45);
    }
    .log-svc-menu.open { display: block; }
    .log-svc-actions { display: flex; gap: 6px; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .log-svc-actions button { padding: 4px 8px; font-size: 0.74rem; border-radius: 5px; }
    .log-svc-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 2px;
      font-size: 0.8rem;
      cursor: pointer;
      user-select: none;
    }
    .log-svc-item .mono { color: var(--muted); font-size: 0.72rem; margin-left: auto; }
    .log-drawer-svc-filter {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      max-height: 200px;
      overflow: auto;
      background: #151d2b;
    }
    .log-drawer-svc-title {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    pre.legacy-log {
      margin: 0;
      max-height: 220px;
      overflow: auto;
      font-size: 0.78rem;
      line-height: 1.45;
      color: #b8c5d9;
      white-space: pre-wrap;
      word-break: break-all;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .busy::after {
      content: ' …';
      animation: pulse 1s infinite;
    }
    @keyframes pulse { 50% { opacity: 0.4; } }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>MEIS 开发控制面板</h1>
      <div class="sub">构建与启停分离 · 前端 Vite 开发服自带热更新 · 后端热加载：同步编译并重启，结果逐步反馈</div>
    </div>
    <div class="toolbar">
      <button class="primary" onclick="act('backend/start-all')" title="启动全部 15 个微服务，已运行的自动跳过">启动全部后端</button>
      <button class="primary" onclick="act('backend/start-core')" title="仅启动核心：租户/认证/系统/文件/网关，已运行的自动跳过">启动核心后端</button>
      <button class="warn" onclick="act('backend/start-debug-all')" title="全部后端以 JDWP 调试模式启动，已运行的自动跳过">调试全部后端</button>
      <button class="warn" onclick="act('backend/start-debug-core')" title="核心后端以 JDWP 调试模式启动，已运行的自动跳过">调试核心后端</button>
      <button class="danger" onclick="act('backend/stop-all')">停止全部后端</button>
      <button class="warn" onclick="act('backend/restart-all')">重启全部后端</button>
      <button class="danger" onclick="confirmClean()" title="mvn clean，清除全部模块 target（classes/JAR），之后需重新打包">整体 Clean</button>
      <button class="primary" onclick="act('build/backend')" title="mvn package -DskipTests，打包全部微服务 JAR">打包后端</button>
      <button onclick="act('build/install')" title="mvn install -DskipTests，安装到本地仓库">Maven Install</button>
      <button onclick="refresh()">刷新状态</button>
      <button class="danger" onclick="shutdownPanel()" title="关闭面板进程并释放 5099 端口，不影响已启动的前后端服务">关闭面板</button>
    </div>
  </header>

  <main>
    <div class="stats" id="stats"></div>

    <div class="section-title">前端</div>
    <table>
      <thead>
        <tr>
          <th>服务</th><th>说明</th><th>端口</th><th>状态</th><th>链接</th><th>构建</th><th>操作</th><th>汇入日志</th>
        </tr>
      </thead>
      <tbody id="frontend-row"></tbody>
    </table>

    <div class="section-title">公共库模块</div>
    <table>
      <thead>
        <tr>
          <th>模块</th><th>说明</th><th>产物</th><th>依赖</th><th>构建</th><th>操作</th>
        </tr>
      </thead>
      <tbody id="library-rows"></tbody>
    </table>

    <div class="section-title">后端微服务</div>
    <table>
      <thead>
        <tr>
          <th>服务</th><th>说明</th><th>HTTP</th><th>JDWP</th><th>JAR</th><th>构建</th><th>操作</th><th>汇入日志</th>
        </tr>
      </thead>
      <tbody id="service-rows"></tbody>
    </table>

    <div class="log-panel">
      <h3>运行日志（带时间戳，便于排查启动与运行错误）</h3>
      <div class="log-toolbar">
        <div class="log-svc-filter-wrap">
          <button type="button" id="log-filter-btn" onclick="toggleLogFilterMenu(event)">服务: 全部服务 ▾</button>
          <div id="log-svc-menu" class="log-svc-menu">
            <div id="log-svc-filter-toolbar-list"></div>
          </div>
        </div>
        <label><input type="checkbox" id="log-errors-only" onchange="refreshLogs()" /> 仅错误/警告</label>
        <label><input type="checkbox" id="log-debug" onchange="refreshLogs()" /> 调试日志</label>
        <label><input type="checkbox" id="log-auto" checked onchange="toggleLogAuto()" /> 自动刷新</label>
        <button onclick="refreshLogs()">刷新日志</button>
        <button onclick="scrollLogBottom()">滚到底部</button>
        <button onclick="toggleLogDrawer(true, 'all')">全部文本</button>
        <button onclick="toggleLogDrawer(true, 'single')">日志详情</button>
        <span class="log-meta" id="log-meta">—</span>
      </div>
      <div class="log-drawer-hint">点击任意日志行查看完整内容；「全部文本」可浏览当前筛选下的所有日志</div>
      <div class="log-console" id="log-console">
        <div class="log-empty">加载中…</div>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <div id="log-drawer-backdrop" class="log-drawer-backdrop" onclick="toggleLogDrawer(false)"></div>
  <aside id="log-drawer" class="log-drawer" aria-label="日志详情">
    <div class="log-drawer-header">
      <div class="log-drawer-tabs">
        <button type="button" id="log-tab-single" class="active" onclick="setLogDrawerTab('single')">选中条目</button>
        <button type="button" id="log-tab-all" onclick="setLogDrawerTab('all')">全部文本</button>
      </div>
      <button type="button" onclick="toggleLogDrawer(false)">关闭</button>
    </div>
    <div class="log-drawer-svc-filter">
      <div class="log-drawer-svc-title">显示服务（与左侧工具栏联动，可多选）</div>
      <div id="log-svc-filter-drawer-list"></div>
    </div>
    <div class="log-drawer-meta" id="log-drawer-meta">点击列表中的日志行查看详情</div>
    <pre class="log-drawer-body" id="log-drawer-body"></pre>
    <div class="log-drawer-footer">
      <button type="button" onclick="copyLogDrawer()">复制文本</button>
      <button type="button" onclick="openLogDrawerInNewWindow()">新窗口打开</button>
      <input type="search" id="log-drawer-search" placeholder="在全部文本中搜索…" oninput="renderLogDrawer()" />
    </div>
  </aside>

  <script>
    const LOG_WATCH_KEY = 'meis-dev-panel-log-watch'
    const LOG_FILTER_KEY = 'meis-dev-panel-log-filter'
    const BUILD_OPTS_KEY = 'meis-dev-panel-build-opts'
    let busy = false
    let busySince = 0
    let busySafetyTimer = null
    let timer = null
    let logTimer = null
    let refreshInFlight = false
    let lastStatusAt = ''
    let statusRefreshFailed = false
    let lastStatusData = null
    let refreshLogsInFlight = false
    let logFollowBottom = true
    let pinnedService = 'all'
    let logWatch = {}
    let logFilter = {}
    let logServiceOptions = []
    let buildOpts = {}
    let knownServiceNames = []
    let coreServiceNames = []
    let cachedLogEntries = []
    let selectedLogIndex = -1
    let logDrawerTab = 'single'
    let logDrawerOpen = false
    let lastServiceList = []
    let buildPendingUntil = {}
    let debugPendingUntil = {}
    let debugPendingSince = {}
    let hotReloadPending = {}
    let hotReloadFlash = {}
    let libraryReloadPending = {}
    let libraryReloadFlash = {}

    function isDebugRunning(svc) {
      return !!(svc && svc.debugUp && svc.httpUp)
    }

    function markDebugPending(name, seconds = 150) {
      debugPendingUntil[name] = Date.now() + seconds * 1000
      debugPendingSince[name] = Date.now()
    }

    function isDebugPending(name) {
      const until = debugPendingUntil[name]
      if (!until) return false
      if (Date.now() >= until) {
        clearDebugPending(name)
        return false
      }
      return true
    }

    function clearDebugPending(name) {
      delete debugPendingUntil[name]
      delete debugPendingSince[name]
    }

    function updateDebugPendingFromStatus(services) {
      for (const s of (services || [])) {
        if (isDebugRunning(s)) {
          clearDebugPending(s.name)
          continue
        }
        if (!isDebugPending(s.name)) continue
        const since = debugPendingSince[s.name] || 0
        const elapsed = Date.now() - since
        // JDWP 曾短暂起来又退出（Flyway 等启动失败）：10 秒后解除「启动中」
        if (!s.debugUp && !s.httpUp && elapsed > 10000) {
          clearDebugPending(s.name)
        }
      }
    }

    function renderJdwpCell(s) {
      const port = s.debugPort ? ('<span class="mono">:' + s.debugPort + '</span>') : ''
      if (isDebugRunning(s)) {
        return '<span class="dot debug"></span>调试 ' + port
      }
      if (isDebugPending(s.name) || (s.debugUp && !s.httpUp)) {
        return '<span class="dot debug"></span>启动中 ' + port
      }
      return '<span class="muted">—</span> ' + port
    }

    function formatHotReloadSteps(steps) {
      if (!Array.isArray(steps) || !steps.length) return ''
      const labels = { compile: '编译', stop: '停止', sync: '写JAR', restart: '重启', health: '健康检查' }
      return steps.map(st => {
        const label = labels[st.step] || st.step
        const mark = st.ok ? '✓' : '✗'
        return mark + label
      }).join(' → ')
    }

    function renderHotReloadStatus(s) {
      const name = s.name
      if (hotReloadPending[name]) {
        return '<span class="hot-reload-status running" title="正在编译、写入 JAR 并重启…">⟳ 加载中</span>'
      }
      const hr = s.hotReload
      if (!hr) return ''
      const cls = hr.ok ? 'ok' : 'fail'
      const stepTip = formatHotReloadSteps(hr.steps)
      const title = escapeHtml((hr.message || '') + (stepTip ? '\n' + stepTip : ''))
      const icon = hr.ok ? '✓' : '✗'
      return `<span class="hot-reload-status ${cls}" title="${title}">${icon} ${escapeHtml(hr.at || '')}</span>`
    }

    function renderLibraryArtifact(lib) {
      if (lib.buildInProgress || isBuildPending(lib.name)) {
        return '<span style="color:var(--warn)">编译中…</span>'
      }
      const parts = []
      if (lib.classesExists) {
        parts.push('classes ' + escapeHtml(lib.classesMtime || ''))
      } else {
        parts.push('<span style="color:var(--err)">classes 缺失</span>')
      }
      if (lib.jarExists) {
        parts.push('jar ' + lib.jarSizeKb + ' KB')
      }
      return parts.join('<div class="jar-meta"></div>')
    }

    function renderLibraryDependents(lib) {
      const dbg = lib.debugDependentCount || 0
      const total = lib.dependentCount || 0
      const tip = (lib.dependents || []).join(', ')
      return `<span title="${escapeHtml(tip)}">调试中 ${dbg} / 共 ${total}</span>`
    }

    function renderLibraryBuildOpts(lib) {
      return `
        <div class="build-opts">
          <span class="build-section-label">仅编译</span>
          <div class="build-opts-actions">
            <button onclick="libraryCompile('${lib.name}')" title="仅编译本模块（约数秒），不含下游微服务">快速编译</button>
          </div>
        </div>
      `
    }

    function renderLibraryHotReloadStatus(lib) {
      const name = lib.name
      if (libraryReloadPending[name]) {
        return '<span class="hot-reload-status running" title="正在编译并热加载依赖服务…">⟳ 加载中</span>'
      }
      const hr = lib.hotReload
      if (!hr) return ''
      const cls = hr.ok ? 'ok' : 'fail'
      const icon = hr.ok ? '✓' : '✗'
      return `<span class="hot-reload-status ${cls}" title="${escapeHtml(hr.message || '')}">${icon} ${escapeHtml(hr.at || '')}</span>`
    }

    function renderLibraryActions(lib) {
      const name = lib.name
      const dbg = lib.debugDependentCount || 0
      const busy = !!libraryReloadPending[name]
      const flash = libraryReloadFlash[name]
      const flashCls = flash === 'ok' ? ' ok-flash' : (flash === 'fail' ? ' fail-flash' : '')
      const disabled = (dbg === 0 || busy) ? ' disabled' : ''
      const title = dbg === 0
        ? '无调试运行中的依赖服务；请先对相关微服务点「调试」'
        : 'compile 本库 → 对调试中的依赖服务逐个热加载'
      let html = `<button class="hot-reload${flashCls}${busy ? ' loading' : ''}"${disabled} onclick="libraryReloadDependents('${name}')" title="${escapeHtml(title)}">${busy ? '加载中…' : '热加载依赖'}</button>`
      html += renderLibraryHotReloadStatus(lib)
      return html
    }

    function renderLibraries(list) {
      document.getElementById('library-rows').innerHTML = (list || []).map(lib => `
        <tr>
          <td class="mono">${lib.name}</td>
          <td>${renderServiceInfo(lib)}</td>
          <td>${renderLibraryArtifact(lib)}</td>
          <td>${renderLibraryDependents(lib)}</td>
          <td>${renderLibraryBuildOpts(lib)}</td>
          <td class="actions">${renderLibraryActions(lib)}</td>
        </tr>
      `).join('')
    }

    async function libraryCompile(name) {
      try {
        markBuildPending(name, 180)
        showToast(name + ': 编译中…', true)
        const resp = await api('/api/library/' + name + '/compile', 'POST')
        showToast(resp.message || (name + ': 编译已提交'), true)
        pollServiceStatus()
      } catch (e) {
        showToast(name + ': 编译失败 — ' + e.message, false)
      }
    }

    async function libraryReloadDependents(name) {
      if (libraryReloadPending[name]) return
      libraryReloadPending[name] = true
      refresh()
      try {
        showToast(name + ': 正在热加载依赖服务（可能需数分钟）…', true)
        const resp = await api('/api/library/' + name + '/reload-dependents', 'POST', 600000)
        const result = resp.data || resp
        const ok = resp.ok !== false && result.ok !== false
        libraryReloadFlash[name] = ok ? 'ok' : 'fail'
        setTimeout(() => { delete libraryReloadFlash[name] }, 4000)
        showToast(name + ': ' + (resp.message || result.message || (ok ? '完成' : '失败')), ok)
      } catch (e) {
        libraryReloadFlash[name] = 'fail'
        setTimeout(() => { delete libraryReloadFlash[name] }, 4000)
        showToast(name + ': 热加载失败 — ' + e.message, false)
      } finally {
        delete libraryReloadPending[name]
        refresh()
      }
    }

    function renderServiceActions(s) {
      const name = s.name
      const debugRunning = isDebugRunning(s)
      const debugPending = isDebugPending(name)
      const reloadBusy = !!hotReloadPending[name]
      const flash = hotReloadFlash[name]
      let html = ''
      if (!debugRunning) {
        html += `<button onclick="serviceAct('${name}','start')">启动</button>`
      }
      if (!debugRunning && !debugPending) {
        html += `<button onclick="serviceAct('${name}','start-debug')">调试</button>`
      }
      if (debugPending && !debugRunning) {
        html += `<span style="font-size:0.74rem;color:var(--warn);align-self:center">调试启动中…</span>`
      }
      if (debugRunning) {
        const flashCls = flash === 'ok' ? ' ok-flash' : (flash === 'fail' ? ' fail-flash' : '')
        const btnLabel = reloadBusy ? '加载中…' : '热加载'
        const disabled = reloadBusy ? ' disabled' : ''
        html += `<button class="hot-reload${flashCls}${reloadBusy ? ' loading' : ''}"${disabled} onclick="serviceReloadClasses('${name}')" title="compile -> stop -> write JAR -> restart (brief downtime)">热加载</button>`
        html += renderHotReloadStatus(s)
      }
      html += `<button onclick="serviceAct('${name}','restart')">重启</button>`
      html += `<button onclick="serviceAct('${name}','stop')">停止</button>`
      html += `<button onclick="showLog('${name}')">日志</button>`
      html += `<button onclick="showLog('${name}',true)">调试日志</button>`
      return html
    }

    const BACKEND_BUILD_ACTIONS = {
      quick: { label: '快速更新', hint: 'compile + 写入 JAR' },
      package: { label: '完整打包', hint: 'mvn package' },
      'clean-package': { label: '清理重建', hint: 'clean + package' }
    }

    const FRONTEND_BUILD_ACTIONS = {
      install: { label: '依赖安装', hint: 'npm install，package.json 变更后' },
      typecheck: { label: '类型检查', hint: 'vue-tsc，不启动服务' },
      build: { label: '生产构建', hint: 'vite build，验证生产包' }
    }

    let frontendPendingUntil = 0

    function isFrontendPending() {
      if (!frontendPendingUntil) return false
      if (Date.now() >= frontendPendingUntil) {
        frontendPendingUntil = 0
        return false
      }
      return true
    }

    function markFrontendPending(seconds = 120) {
      frontendPendingUntil = Date.now() + seconds * 1000
    }

    function clearFrontendPending() {
      frontendPendingUntil = 0
    }

    function loadBuildOpts(names) {
      // 后端构建模式已改为按钮，无需持久化；保留 key 避免旧数据报错
      buildOpts = {}
    }

    function markBuildPending(name, seconds = 120) {
      buildPendingUntil[name] = Date.now() + seconds * 1000
    }

    function isBuildPending(name) {
      const until = buildPendingUntil[name]
      if (!until) return false
      if (Date.now() >= until) {
        delete buildPendingUntil[name]
        return false
      }
      return true
    }

    function pollServiceStatus() {
      setTimeout(refresh, 2000)
      setTimeout(refresh, 6000)
      setTimeout(refresh, 15000)
      setTimeout(refresh, 30000)
      setTimeout(refresh, 60000)
    }

    function renderJarCell(s) {
      if (s.buildInProgress || isBuildPending(s.name)) {
        return '<span style="color:var(--warn)">构建中…</span>'
      }
      if (s.jarExists) {
        const size = s.jarHealthy
          ? (s.jarSizeKb + ' KB')
          : ('<span style="color:var(--err)" title="JAR 异常，请点完整打包">' + s.jarSizeKb + ' KB 异常</span>')
        return size + (s.jarMtime ? '<div class="jar-meta">JAR ' + escapeHtml(s.jarMtime) + '</div>' : '')
      }
      if (s.classesExists) {
        return '<span style="color:var(--ok)">classes 就绪</span>'
          + '<div class="jar-meta" style="color:var(--warn)">JAR 缺失 · 需「完整打包」或「打包后端」</div>'
          + (s.classesMtime ? '<div class="jar-meta">classes ' + escapeHtml(s.classesMtime) + '</div>' : '')
      }
      return '<span style="color:var(--err)">缺失</span><div class="jar-meta">请先「打包后端」或单服务「完整打包」</div>'
    }

    function renderFrontendBuildOpts(fe) {
      const buttons = Object.entries(FRONTEND_BUILD_ACTIONS).map(([mode, meta]) =>
        `<button onclick="frontendBuild('${mode}')" title="${escapeHtml(meta.hint)}">${meta.label}</button>`
      ).join('')
      const hint = fe?.buildInProgress || isBuildPending('meis-web')
        ? '<div class="build-mode-hint" style="color:var(--warn)">构建中…</div>'
        : '<div class="build-mode-hint">仅构建，不启动 Vite</div>'
      return `
        <div class="build-opts">
          <span class="build-section-label">仅构建，不启停</span>
          <div class="build-opts-actions">${buttons}</div>
          ${hint}
        </div>
      `
    }

    function renderFrontendActions(fe) {
      const running = fe.httpUp
      const pending = isFrontendPending()
      let html = ''
      if (!running && !pending) {
        html += `<button onclick="frontendAct('start')">启动开发服</button>`
      }
      if (pending && !running) {
        html += `<span style="font-size:0.74rem;color:var(--warn);align-self:center">Vite 启动中…</span>`
      }
      if (running || pending) {
        html += `<button onclick="frontendAct('stop')">停止</button>`
        html += `<button onclick="frontendAct('restart')">重启</button>`
      }
      if (running) {
        html += `<span style="font-size:0.72rem;color:var(--muted);align-self:center" title="保存代码后浏览器自动刷新">热更新已启用</span>`
      }
      return html
    }

    function renderFrontendStatus(fe) {
      if (fe.httpUp) return statusDot(true)
      if (isFrontendPending()) return '<span class="dot debug"></span>启动中'
      return statusDot(false)
    }
    function renderBackendBuildOpts(svc) {
      const name = svc.name
      const canQuick = svc.jarExists && svc.jarHealthy
      const buttons = Object.entries(BACKEND_BUILD_ACTIONS).map(([mode, meta]) => {
        const disabled = (mode === 'quick' && !canQuick) ? ' disabled' : ''
        const tip = (mode === 'quick' && !canQuick)
          ? 'JAR 缺失或异常，请先点「完整打包」'
          : meta.hint
        return `<button${disabled} onclick="serviceBuild('${name}','${mode}')" title="${escapeHtml(tip)}">${meta.label}</button>`
      }).join('')
      return `
        <div class="build-opts">
          <span class="build-section-label">仅构建，不启停</span>
          <div class="build-opts-actions">${buttons}</div>
          ${canQuick ? '' : '<div class="build-mode-hint">JAR 缺失时请先用「完整打包」</div>'}
        </div>
      `
    }

    function renderServiceInfo(item) {
      const isCore = coreServiceNames.includes(item.name)
      return `
        <div class="svc-name">${escapeHtml(item.labelZh || item.name)}${isCore ? ' <span style="color:var(--accent);font-size:0.72rem">核心</span>' : ''}</div>
        <div class="svc-id mono">${escapeHtml(item.name)}</div>
        <div class="svc-desc">${escapeHtml(item.descZh || '')}</div>
      `
    }

    function loadLogFilter(names) {
      const saved = localStorage.getItem(LOG_FILTER_KEY)
      if (saved) {
        try { logFilter = JSON.parse(saved) || {} } catch { logFilter = {} }
      }
      for (const name of names) {
        if (logFilter[name] === undefined) logFilter[name] = true
      }
      saveLogFilter()
      updateLogFilterButtonLabel()
    }

    function saveLogFilter() {
      localStorage.setItem(LOG_FILTER_KEY, JSON.stringify(logFilter))
    }

    function getActiveLogFilters() {
      return knownServiceNames.filter(n => logFilter[n] !== false)
    }

    function getLogFilterParam() {
      const active = getActiveLogFilters()
      if (active.length === 0) return '&filter='
      if (active.length >= knownServiceNames.length) return ''
      return '&filter=' + encodeURIComponent(active.join(','))
    }

    function logFilterSummary() {
      const active = getActiveLogFilters()
      if (active.length === 0) return '无服务'
      if (active.length >= knownServiceNames.length) return '全部服务'
      if (active.length === 1) {
        const opt = logServiceOptions.find(s => s.name === active[0])
        return opt?.labelZh ? (opt.labelZh + ' / ' + active[0]) : active[0]
      }
      return active.length + ' 个服务'
    }

    function updateLogFilterButtonLabel() {
      const btn = document.getElementById('log-filter-btn')
      if (btn) btn.textContent = '服务: ' + logFilterSummary() + ' ▾'
    }

    function renderLogServiceFilterChecks(containerId) {
      const el = document.getElementById(containerId)
      if (!el) return
      const opts = logServiceOptions.length
        ? logServiceOptions
        : knownServiceNames.map(n => ({ name: n, labelZh: n }))
      el.innerHTML = '<div class="log-svc-actions">' +
        '<button type="button" onclick="setLogFilterAll(true)">全选</button>' +
        '<button type="button" onclick="setLogFilterAll(false)">清空</button>' +
        '</div>' +
        opts.map(s => {
          const name = s.name
          const label = s.labelZh || name
          const checked = logFilter[name] !== false
          return '<label class="log-svc-item"><input type="checkbox" ' + (checked ? 'checked' : '') +
            ' onchange="setLogFilterChecked(\'' + name + '\', this.checked)" />' +
            '<span>' + escapeHtml(label) + '</span><span class="mono">' + escapeHtml(name) + '</span></label>'
        }).join('')
    }

    function syncLogServiceFilterUi() {
      renderLogServiceFilterChecks('log-svc-filter-toolbar-list')
      renderLogServiceFilterChecks('log-svc-filter-drawer-list')
      updateLogFilterButtonLabel()
    }

    function setLogFilterChecked(name, checked) {
      logFilter[name] = !!checked
      saveLogFilter()
      syncLogServiceFilterUi()
      refreshLogs()
    }

    function setLogFilterAll(checked) {
      knownServiceNames.forEach(n => { logFilter[n] = !!checked })
      saveLogFilter()
      syncLogServiceFilterUi()
      refreshLogs()
    }

    function selectOnlyLogFilter(name) {
      knownServiceNames.forEach(n => { logFilter[n] = (n === name) })
      saveLogFilter()
      syncLogServiceFilterUi()
    }

    function toggleLogFilterMenu(ev) {
      if (ev) ev.stopPropagation()
      const menu = document.getElementById('log-svc-menu')
      menu.classList.toggle('open')
      if (menu.classList.contains('open')) syncLogServiceFilterUi()
    }

    function loadLogWatch(names) {
      const saved = localStorage.getItem(LOG_WATCH_KEY)
      if (saved) {
        try { logWatch = JSON.parse(saved) || {} } catch { logWatch = {} }
      }
      for (const name of names) {
        if (logWatch[name] === undefined) logWatch[name] = true
      }
      knownServiceNames = names.slice()
      saveLogWatch()
    }

    function saveLogWatch() {
      localStorage.setItem(LOG_WATCH_KEY, JSON.stringify(logWatch))
    }

    function isLogWatched(name) {
      return logWatch[name] !== false
    }

    function getWatchedParam() {
      if (!knownServiceNames.length) return ''
      const watched = knownServiceNames.filter(isLogWatched)
      if (watched.length === knownServiceNames.length) return ''
      return '&watched=' + encodeURIComponent(watched.join(','))
    }

    function toggleLogWatch(name, checked) {
      logWatch[name] = !!checked
      saveLogWatch()
      refreshLogs()
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    }

    function logEntryText(e) {
      if (!e) return ''
      let t = e.text ?? e.Text ?? ''
      if (t && typeof t === 'object') {
        t = t.value ?? JSON.stringify(t, null, 2)
      }
      return String(t)
    }

    function normalizeLogEntry(raw) {
      return {
        ts: String(raw?.ts ?? raw?.Ts ?? ''),
        service: String(raw?.service ?? raw?.Service ?? ''),
        level: String(raw?.level ?? raw?.Level ?? 'INFO'),
        stream: String(raw?.stream ?? raw?.Stream ?? ''),
        text: logEntryText(raw)
      }
    }

    function ensureLogEntriesArray(entries) {
      if (!entries) return []
      if (Array.isArray(entries)) return entries
      if (typeof entries === 'object') return Object.values(entries)
      return []
    }

    function formatLogEntryLine(e) {
      return (e.ts || '—') + ' [' + (e.level || 'INFO') + '] [' + (e.service || '') + '] ' + logEntryText(e)
    }

    function logPreview(e, maxLen = 96) {
      const t = logEntryText(e)
      if (t.length <= maxLen) return t
      return t.slice(0, maxLen) + '…'
    }

    function setLogDrawerTab(tab) {
      logDrawerTab = tab
      document.getElementById('log-tab-single').classList.toggle('active', tab === 'single')
      document.getElementById('log-tab-all').classList.toggle('active', tab === 'all')
      renderLogDrawer()
    }

    function toggleLogDrawer(open, tab) {
      logDrawerOpen = !!open
      if (tab) setLogDrawerTab(tab)
      document.getElementById('log-drawer').classList.toggle('open', logDrawerOpen)
      document.getElementById('log-drawer-backdrop').classList.toggle('open', logDrawerOpen)
      if (logDrawerOpen) renderLogDrawer()
    }

    function getLogDrawerText() {
      if (logDrawerTab === 'all') {
        const q = (document.getElementById('log-drawer-search').value || '').trim().toLowerCase()
        const lines = cachedLogEntries.map(formatLogEntryLine)
        if (!q) return lines.join('\n')
        return lines.filter(line => line.toLowerCase().includes(q)).join('\n')
      }
      if (selectedLogIndex < 0 || !cachedLogEntries[selectedLogIndex]) {
        return '（未选中日志，请在左侧列表点击一行）'
      }
      const e = cachedLogEntries[selectedLogIndex]
      return formatLogEntryLine(e) + '\n\n' + logEntryText(e)
    }

    function renderLogDrawer() {
      const meta = document.getElementById('log-drawer-meta')
      const body = document.getElementById('log-drawer-body')
      const search = document.getElementById('log-drawer-search')
      search.style.display = logDrawerTab === 'all' ? 'block' : 'none'

      if (logDrawerTab === 'single') {
        const e = cachedLogEntries[selectedLogIndex]
        if (!e) {
          meta.textContent = '点击列表中的日志行查看详情'
        } else {
          meta.innerHTML = '<strong>' + escapeHtml(e.service) + '</strong> · ' +
            escapeHtml(e.ts) + ' · <span style="color:var(--accent)">' + escapeHtml(e.level) + '</span>' +
            (e.stream ? ' · ' + escapeHtml(e.stream) : '')
        }
      } else {
        const q = (search.value || '').trim()
        meta.textContent = '全部文本 · 共 ' + cachedLogEntries.length + ' 条' +
          (q ? ' · 搜索: ' + q : '')
      }
      body.textContent = getLogDrawerText()
    }

    function selectLogEntry(idx) {
      selectedLogIndex = idx
      document.querySelectorAll('.log-line[data-idx]').forEach(el => {
        el.classList.toggle('log-active', Number(el.dataset.idx) === idx)
      })
      if (logDrawerOpen && logDrawerTab === 'single') renderLogDrawer()
    }

    function onLogLineClick(idx) {
      selectLogEntry(idx)
      toggleLogDrawer(true, 'single')
    }

    async function copyLogDrawer() {
      const text = getLogDrawerText()
      try {
        await navigator.clipboard.writeText(text)
        showToast('已复制到剪贴板', true)
      } catch {
        showToast('复制失败', false)
      }
    }

    function openLogDrawerInNewWindow() {
      const text = getLogDrawerText()
      const title = logDrawerTab === 'all' ? 'MEIS 全部日志' : ('MEIS 日志 - ' + (cachedLogEntries[selectedLogIndex]?.service || ''))
      const w = window.open('', '_blank', 'width=960,height=720')
      if (!w) {
        showToast('无法打开新窗口（请允许弹窗）', false)
        return
      }
      w.document.title = title
      w.document.body.style.cssText = 'margin:0;background:#0b1018;color:#d4deec;font-family:Consolas,monospace'
      const pre = w.document.createElement('pre')
      pre.style.cssText = 'margin:0;padding:16px;white-space:pre-wrap;word-break:break-word;line-height:1.55'
      pre.textContent = text
      w.document.body.appendChild(pre)
    }

    function localizePanelMessage(msg) {
      const m = String(msg || '')
      if (m.includes('JAR too small')) return 'JAR 异常偏小，快速更新可能已损坏产物，请改选「完整打包」后编译再启动'
      if (m.includes('Missing JAR')) return '缺少 JAR，请先选「完整打包」并编译'
      if (m.includes('Run full package')) return 'JAR 需要完整打包，请将构建模式改为「完整打包」后点编译'
      if (m.includes('in background')) return m.replace(/.* in background/i, '已提交后台，请稍候刷新状态')
      if (m.includes('Select at least one build step')) return '未指定构建步骤，请重新点击构建按钮'
      if (m.includes('FlywayValidateException') || m.includes('checksum mismatch') || m.includes('Validate failed')) {
        return 'Flyway 迁移校验失败（脚本已变更）。请完整打包 meis-tenant 后重启；dev 环境会自动 repair'
      }
      return m
    }

    function showToast(msg, ok = true) {
      const el = document.getElementById('toast')
      el.textContent = localizePanelMessage(msg)
      el.className = 'toast show ' + (ok ? 'ok' : 'err')
      setTimeout(() => el.classList.remove('show'), 5000)
    }

    function tryAcquireBusy() {
      if (busy) {
        const secs = Math.round((Date.now() - busySince) / 1000)
        showToast('有操作正在进行（已 ' + secs + ' 秒），请稍候…', false)
        return false
      }
      busy = true
      busySince = Date.now()
      document.body.classList.add('busy')
      if (busySafetyTimer) clearTimeout(busySafetyTimer)
      busySafetyTimer = setTimeout(() => {
        if (busy) releaseBusy('操作超时，已自动解除锁定')
      }, 180000)
      return true
    }

    function releaseBusy(hint) {
      busy = false
      busySince = 0
      document.body.classList.remove('busy')
      if (busySafetyTimer) {
        clearTimeout(busySafetyTimer)
        busySafetyTimer = null
      }
      if (hint) showToast(hint, false)
    }

    async function api(path, method = 'GET', timeoutMs = 30000) {
      const controller = new AbortController()
      const timerId = setTimeout(() => controller.abort(), timeoutMs)
      try {
        const res = await fetch(path, { method, signal: controller.signal })
        let data
        try {
          data = await res.json()
        } catch {
          throw new Error('响应解析失败 (HTTP ' + res.status + ')')
        }
        if (!res.ok) {
          throw new Error(data.message || ('HTTP ' + res.status))
        }
        return data
      } catch (e) {
        if (e.name === 'AbortError') {
          throw new Error('请求超时（面板可能正忙），请稍后重试')
        }
        throw e
      } finally {
        clearTimeout(timerId)
      }
    }

    async function confirmClean() {
      if (!confirm('整体 Clean 将删除全部模块的 target 目录（含 classes 与 JAR）。\n\n已启动的服务不会自动停止，但 JAR 将变为缺失，需再点「打包后端」。\n\n确认继续？')) return
      await act('build/clean')
    }

    async function act(path, buildQuery = '') {
      if (!tryAcquireBusy()) return
      try {
        const data = await api('/api/' + path + buildQuery, 'POST', 60000)
        showToast(data.message || (data.ok ? '完成' : '失败'), data.ok !== false)
        await refresh()
        await refreshLogs()
        if (path === 'backend/stop-all') {
          setTimeout(refresh, 3000)
          setTimeout(refresh, 8000)
        }
      } catch (e) {
        showToast(e.message, false)
      } finally {
        releaseBusy()
      }
    }

    async function shutdownPanel() {
      if (!confirm('关闭开发控制面板？\n（不会停止已启动的前后端服务，仅释放 :5099）')) return
      try {
        const data = await api('/api/panel/shutdown', 'POST')
        showToast(data.message || '面板正在关闭', true)
        document.getElementById('log-meta').textContent = '面板已关闭'
        document.body.classList.add('busy')
        setTimeout(() => {
          document.body.innerHTML = '<div style="padding:40px;font-family:sans-serif;color:#e7ecf3;background:#0f1419;min-height:100vh"><h2>开发控制面板已关闭</h2><p>端口 5099 已释放。重新启动请运行 VS Code「开发控制面板」或：</p><pre style="background:#1a2332;padding:12px;border-radius:8px">powershell -File scripts\\dev-panel.ps1</pre></div>'
        }, 600)
      } catch (e) {
        showToast('关闭失败（面板可能已卡死）。请运行 VS Code「关闭开发控制面板」或 scripts\\stop-dev-panel.ps1', false)
      }
    }

    async function frontendAct(action) {
      if (!tryAcquireBusy()) return
      selectOnlyLogFilter('meis-web')
      const labels = { start: '启动开发服', restart: '重启', stop: '停止' }
      try {
        showToast('meis-web: 正在' + (labels[action] || action) + '…', true)
        if (action === 'start' || action === 'restart') markFrontendPending()
        if (action === 'stop') clearFrontendPending()
        const data = await api('/api/frontend/' + action, 'POST', action === 'stop' ? 15000 : 30000)
        showToast('meis-web: ' + (labels[action] || action) + ' 已提交后台，请稍候刷新状态', data.ok !== false)
        pollServiceStatus()
        refreshLogs()
      } catch (e) {
        showToast(e.message, false)
        if (action !== 'stop') clearFrontendPending()
      } finally {
        releaseBusy()
      }
    }

    async function frontendBuild(mode) {
      if (!FRONTEND_BUILD_ACTIONS[mode]) return
      if (!tryAcquireBusy()) return
      try {
        const label = FRONTEND_BUILD_ACTIONS[mode].label
        showToast('meis-web: 正在' + label + '…', true)
        const data = await api('/api/frontend/build?mode=' + encodeURIComponent(mode), 'POST', 30000)
        showToast('meis-web: ' + label + ' 已提交后台，请稍候刷新状态', data.ok !== false)
        markBuildPending('meis-web', mode === 'install' ? 300 : 180)
        pollServiceStatus()
      } catch (e) {
        showToast(e.message, false)
      } finally {
        releaseBusy()
      }
    }

    async function serviceAct(name, action) {
      if (!tryAcquireBusy()) return
      pinnedService = name
      selectOnlyLogFilter(name)
      const labels = { start: '启动', 'start-debug': '调试', restart: '重启', stop: '停止' }
      try {
        showToast(name + ': 正在' + (labels[action] || action) + '…', true)
        if (action === 'start-debug') markDebugPending(name)
        if (action === 'stop') clearDebugPending(name)
        const data = await api('/api/service/' + name + '/' + action, 'POST', 30000)
        showToast(name + ': ' + (labels[action] || action) + ' 已提交后台，请稍候刷新状态', data.ok !== false)
        pollServiceStatus()
        refreshLogs()
      } catch (e) {
        showToast(e.message, false)
      } finally {
        releaseBusy()
      }
    }

    async function serviceBuild(name, mode) {
      if (!BACKEND_BUILD_ACTIONS[mode]) mode = 'quick'
      const svc = lastServiceList.find(s => s.name === name)
      if (mode === 'quick' && svc && (!svc.jarExists || !svc.jarHealthy)) {
        showToast(name + ': JAR 缺失或异常，请先点「完整打包」', false)
        return
      }
      if (!tryAcquireBusy()) return
      try {
        const label = BACKEND_BUILD_ACTIONS[mode].label
        showToast(name + ': 正在' + label + '…', true)
        const data = await api('/api/service/' + name + '/build?mode=' + encodeURIComponent(mode), 'POST', 30000)
        showToast(name + ': ' + label + ' 已提交后台，请稍候刷新状态', data.ok !== false)
        markBuildPending(name, mode === 'clean-package' ? 180 : 120)
        pollServiceStatus()
      } catch (e) {
        showToast(e.message, false)
      } finally {
        releaseBusy()
      }
    }

    async function serviceReloadClasses(name) {
      const svc = lastServiceList.find(s => s.name === name)
      if (!isDebugRunning(svc)) {
        showToast('热加载仅适用于调试运行中的服务（HTTP + JDWP 均就绪）', false)
        return
      }
      if (!tryAcquireBusy()) return
      hotReloadPending[name] = true
      delete hotReloadFlash[name]
      renderServices(lastServiceList)
      selectOnlyLogFilter(name)
      try {
        showToast(name + ': 热加载中（编译 → 写 JAR → 重启，约 1–2 分钟）…', true)
        const resp = await api('/api/service/' + name + '/reload-classes', 'POST', 180000)
        const result = resp.data || resp
        const ok = resp.ok !== false && result.ok !== false
        const stepText = formatHotReloadSteps(result.steps)
        const summary = (resp.message || result.message || (ok ? '热加载成功' : '热加载失败'))
        showToast(name + ': ' + summary + (stepText ? ' [' + stepText + ']' : ''), ok)
        hotReloadFlash[name] = ok ? 'ok' : 'fail'
        setTimeout(() => { delete hotReloadFlash[name]; renderServices(lastServiceList) }, 8000)
        await refresh()
        await refreshLogs()
        if (!ok) {
          showLog(name, true)
        }
      } catch (e) {
        hotReloadFlash[name] = 'fail'
        setTimeout(() => { delete hotReloadFlash[name]; renderServices(lastServiceList) }, 8000)
        showToast(name + ': 热加载失败 — ' + e.message, false)
        showLog(name, true)
      } finally {
        delete hotReloadPending[name]
        renderServices(lastServiceList)
        releaseBusy()
      }
    }

    function onLogFilterChange() {
      refreshLogs()
    }

    function toggleLogAuto() {
      const on = document.getElementById('log-auto').checked
      if (on && !logTimer) {
        logTimer = setInterval(refreshLogs, 3000)
      } else if (!on && logTimer) {
        clearInterval(logTimer)
        logTimer = null
      }
    }

    function scrollLogBottom() {
      const el = document.getElementById('log-console')
      el.scrollTop = el.scrollHeight
      logFollowBottom = true
    }

    async function refreshLogs() {
      if (document.hidden || refreshLogsInFlight || refreshInFlight) return
      refreshLogsInFlight = true
      const errorsOnly = document.getElementById('log-errors-only').checked ? '1' : '0'
      const debug = document.getElementById('log-debug').checked ? '1' : '0'
      const el = document.getElementById('log-console')
      const nearBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 48

      try {
        const watchParam = getWatchedParam()
        const filterParam = getLogFilterParam()
        const data = await api('/api/logs/stream?service=all&lines=200&errorsOnly=' + errorsOnly + '&debug=' + debug + watchParam + filterParam, 'GET', 25000)
        if (Array.isArray(data.services)) {
          logServiceOptions = data.services
          syncLogServiceFilterUi()
        }
        document.getElementById('log-meta').textContent = '更新: ' + (data.fetchedAt || '—') + ' · ' + (data.entries?.length || 0) + ' 条 · ' + logFilterSummary()

        const entries = ensureLogEntriesArray(data.entries).map(normalizeLogEntry).slice().reverse()
        cachedLogEntries = entries
        if (selectedLogIndex >= entries.length) selectedLogIndex = -1

        if (!entries.length) {
          const watchedCount = knownServiceNames.filter(isLogWatched).length
          const filterCount = getActiveLogFilters().length
          let hint = '暂无日志（服务未启动或 logs 目录无输出）'
          if (filterCount === 0) {
            hint = '未勾选任何显示服务，请在「服务」筛选中至少勾选一个（含 meis-web 前端）'
          } else if (watchedCount === 0) {
            hint = '未勾选任何服务的「汇入日志」，请在服务列表右侧勾选'
          } else if (document.getElementById('log-errors-only').checked) {
            hint = '当前筛选下无错误/警告日志'
          }
          el.innerHTML = '<div class="log-empty">' + escapeHtml(hint) + '</div>'
          if (logDrawerOpen) renderLogDrawer()
          return
        }

        el.innerHTML = '<div class="log-line log-header" style="position:sticky;top:0;background:#151d2b;font-weight:600;z-index:1">' +
          '<span class="ts">时间</span><span class="svc">服务</span><span class="lvl">级别</span><span class="msg">内容（点击查看全文）</span></div>' +
          entries.map((e, idx) => {
          const lvl = e.level || 'INFO'
          const cls = 'log-line lvl-' + lvl + (idx === selectedLogIndex ? ' log-active' : '')
          return '<div class="' + cls + '" data-idx="' + idx + '" onclick="onLogLineClick(' + idx + ')" title="点击查看完整日志">' +
            '<span class="ts">' + escapeHtml(e.ts || '') + '</span>' +
            '<span class="svc">' + escapeHtml(e.service || '') + '</span>' +
            '<span class="lvl">' + escapeHtml(lvl) + '</span>' +
            '<span class="msg msg-preview">' + escapeHtml(logPreview(e)) + '</span>' +
            '</div>'
        }).join('')

        if (logDrawerOpen) renderLogDrawer()

        if (logFollowBottom || nearBottom) {
          el.scrollTop = el.scrollHeight
        }
      } catch (e) {
        if (!document.hidden) {
          el.innerHTML = '<div class="log-empty">日志加载失败: ' + escapeHtml(e.message) + '</div>'
        }
      } finally {
        refreshLogsInFlight = false
      }
    }

    function showLog(name, debug = false) {
      selectOnlyLogFilter(name)
      document.getElementById('log-debug').checked = !!debug
      refreshLogs()
      document.querySelector('.log-panel').scrollIntoView({ behavior: 'smooth', block: 'start' })
    }

    function statusDot(up) {
      return '<span class="dot ' + (up ? 'up' : 'down') + '"></span>' + (up ? '运行中' : '已停止')
    }

    function renderStats(data) {
      const up = (data.services || []).filter(s => s.httpUp).length
      const total = (data.services || []).length
      const fe = data.frontend?.httpUp ? 1 : 0
      const bg = data.backgroundJobs || []
      const buildLabels = {
        'reactor-clean': '整体 Clean',
        'maven-install': 'Maven Install',
        'build-backend': '打包后端'
      }
      const buildHint = bg.length
        ? bg.map(j => buildLabels[j] || j).join('、') + ' 进行中…'
        : ''
      const staleHint = statusRefreshFailed
        ? '<div class="stat"><div class="label">状态</div><div class="value" style="font-size:0.9rem;color:var(--warn)">刷新失败，显示可能过期</div></div>'
        : (lastStatusAt ? `<div class="stat"><div class="label">刷新</div><div class="value" style="font-size:0.85rem">${escapeHtml(lastStatusAt)}</div></div>` : '')
      document.getElementById('stats').innerHTML = `
        <div class="stat"><div class="label">后端在线</div><div class="value">${up}/${total}</div></div>
        <div class="stat"><div class="label">前端</div><div class="value">${fe ? '运行' : '停止'}</div></div>
        <div class="stat"><div class="label">Redis</div><div class="value">${data.redisUp ? 'OK' : '—'}</div></div>
        <div class="stat"><div class="label">网关</div><div class="value" style="font-size:0.95rem"><a href="${data.gatewayUrl}" target="_blank">:8080</a></div></div>
        ${staleHint}
        ${buildHint ? `<div class="stat"><div class="label">后台任务</div><div class="value" style="font-size:0.9rem;color:var(--warn)">${buildHint}</div></div>` : ''}
      `
    }

    function renderFrontend(fe) {
      if (!fe) return
      const feWatch = isLogWatched(fe.name)
      document.getElementById('frontend-row').innerHTML = `
        <tr>
          <td class="mono">${fe.name}</td>
          <td>${renderServiceInfo(fe)}</td>
          <td class="mono">:${fe.port}</td>
          <td>${renderFrontendStatus(fe)}</td>
          <td>${fe.httpUp ? ('<a href="' + fe.url + '" target="_blank">' + fe.url + '</a>') : '<span class="muted">—</span>'}</td>
          <td>${renderFrontendBuildOpts(fe)}</td>
          <td class="actions">${renderFrontendActions(fe)}</td>
          <td>
            <label class="log-watch" title="勾选后该服务日志汇入底部综合窗口">
              <input type="checkbox" ${feWatch ? 'checked' : ''} onchange="toggleLogWatch('${fe.name}', this.checked)" />
              汇入
            </label>
          </td>
        </tr>
      `
    }

    function renderServices(list) {
      lastServiceList = list || []
      document.getElementById('service-rows').innerHTML = lastServiceList.map(s => `
        <tr>
          <td class="mono">${s.name}</td>
          <td>${renderServiceInfo(s)}</td>
          <td>${statusDot(s.httpUp)} <span class="mono">:${s.port}</span></td>
          <td>${renderJdwpCell(s)}</td>
          <td>${renderJarCell(s)}</td>
          <td>${renderBackendBuildOpts(s)}</td>
          <td class="actions">${renderServiceActions(s)}</td>
          <td>
            <label class="log-watch" title="勾选后该服务日志汇入底部综合窗口">
              <input type="checkbox" ${isLogWatched(s.name) ? 'checked' : ''} onchange="toggleLogWatch('${s.name}', this.checked)" />
              汇入
            </label>
          </td>
        </tr>
      `).join('')
    }

    async function refresh() {
      if (refreshInFlight) return
      refreshInFlight = true
      try {
        const data = await api('/api/status', 'GET', 20000)
        lastStatusData = data
        coreServiceNames = data.coreServices || []
        const names = ['meis-web', 'panel']
          .concat((data.libraries || []).map(l => l.name))
          .concat((data.services || []).map(s => s.name))
        loadLogWatch(names)
        loadLogFilter(names)
        loadBuildOpts(names)
        renderStats(data)
        renderFrontend(data.frontend)
        if (data.frontend?.httpUp) clearFrontendPending()
        renderLibraries(data.libraries)
        renderServices(data.services)
        updateDebugPendingFromStatus(data.services)
        statusRefreshFailed = false
        lastStatusAt = new Date().toLocaleTimeString()
        for (const s of (data.services || [])) {
          if (s.jarExists && s.jarHealthy) delete buildPendingUntil[s.name]
          else if (s.classesExists) delete buildPendingUntil[s.name]
          if (isDebugRunning(s)) clearDebugPending(s.name)
        }
        for (const lib of (data.libraries || [])) {
          if (lib.classesExists) delete buildPendingUntil[lib.name]
        }
      } catch (e) {
        statusRefreshFailed = true
        if (lastStatusData) renderStats(lastStatusData)
        // 轮询失败不弹 toast，避免后台标签页刷屏
        if (!document.hidden) {
          console.warn('status refresh failed:', e.message)
        }
      } finally {
        refreshInFlight = false
      }
    }

    function pauseAutoRefresh() {
      if (timer) {
        clearInterval(timer)
        timer = null
      }
      if (logTimer) {
        clearInterval(logTimer)
        logTimer = null
      }
    }

    function resumeAutoRefresh() {
      if (!timer) timer = setInterval(refresh, 5000)
      toggleLogAuto()
    }

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        pauseAutoRefresh()
        return
      }
      if (busy && busySince && Date.now() - busySince > 15000) {
        releaseBusy('页面恢复，已重置操作状态')
      }
      resumeAutoRefresh()
      refresh()
      refreshLogs()
    })

    refresh()
    refreshLogs()
    timer = setInterval(refresh, 5000)
    toggleLogAuto()

    document.getElementById('log-console').addEventListener('scroll', (e) => {
      const el = e.target
      logFollowBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 48
    })

    document.addEventListener('click', (e) => {
      const wrap = document.querySelector('.log-svc-filter-wrap')
      const menu = document.getElementById('log-svc-menu')
      if (wrap && menu && !wrap.contains(e.target)) {
        menu.classList.remove('open')
      }
    })
  </script>
</body>
