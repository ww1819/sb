server:
  port: 8082
spring:
  application:
    name: meis-tenant
  flyway:
    enabled: true
    schemas: public
    default-schema: public
    locations: classpath:db/migrations/public
    baseline-on-migrate: true
    ignore-migration-patterns: "*:missing"
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:43.138.177.53}:${POSTGRES_PORT:5432}/${POSTGRES_DB:meis}
    username: ${POSTGRES_USER:med}
    password: ${POSTGRES_PASSWORD:med123456}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
meis:
  jwt:
    secret: meis-saas-jwt-secret-change-in-production-256bits
  flyway:
    tenant-locations: classpath:db/migrations/tenant
  cache:
    enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health,info
