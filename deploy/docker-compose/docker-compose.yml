version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: meis
      POSTGRES_USER: med
      POSTGRES_PASSWORD: med123456
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
  nacos:
    image: nacos/nacos-server:v2.3.0
    environment:
      MODE: standalone
    ports: ["8848:8848"]
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
  meis-gateway:
    image: meis/gateway:1.0.0
    ports: ["8080:8080"]
    depends_on: [postgres, redis, nacos]
  meis-auth:
    image: meis/auth:1.0.0
    depends_on: [postgres, nacos]
  meis-tenant:
    image: meis/tenant:1.0.0
    depends_on: [postgres, nacos]
  meis-system:
    image: meis/system:1.0.0
    depends_on: [postgres, nacos]
volumes:
  pgdata:
