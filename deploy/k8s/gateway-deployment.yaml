apiVersion: apps/v1
kind: Deployment
metadata:
  name: meis-gateway
  namespace: meis-saas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: meis-gateway
  template:
    metadata:
      labels:
        app: meis-gateway
    spec:
      containers:
        - name: gateway
          image: meis/gateway:1.0.0
          ports:
            - containerPort: 8080
          env:
            - name: NACOS_SERVER
              value: nacos:8848
---
apiVersion: v1
kind: Service
metadata:
  name: meis-gateway
  namespace: meis-saas
spec:
  selector:
    app: meis-gateway
  ports:
    - port: 80
      targetPort: 8080
