server:
  max-http-request-header-size: 64KB
  port: 8092
spring:
  application:
    name: meis-file
  flyway:
    enabled: false
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:43.138.177.53}:${POSTGRES_PORT:5432}/${POSTGRES_DB:meis}
    username: ${POSTGRES_USER:med}
    password: ${POSTGRES_PASSWORD:med123456}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
meis:
  jwt:
    secret: meis-saas-jwt-secret-change-in-production-256bits
    issuer: meis-saas
    expiration-ms: 86400000
  minio:
    # 默认 9100：避免与本机新良田高拍仪 eloamwebservice(9000) 冲突（PLT-CAM）
    endpoint: ${MINIO_ENDPOINT:http://localhost:9100}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: meis
management:
  endpoints:
    web:
      exposure:
        include: health,info