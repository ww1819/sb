server:
  max-http-request-header-size: 64KB
  port: 8080
spring:
  application:
    name: meis-gateway
  profiles:
    active: dev
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
      connect-timeout: 2s
  autoconfigure:
    exclude:
      - com.meis.saas.common.config.CommonAutoConfiguration
  flyway:
    enabled: false
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
    gateway:
      discovery:
        locator:
          enabled: false
meis:
  jwt:
    secret: meis-saas-jwt-secret-change-in-production-256bits
    issuer: meis-saas
    expiration-ms: 86400000
  cache:
    enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health,info
