server:
  max-http-request-header-size: 64KB
  port: 8093
spring:
  application:
    name: meis-notification
  flyway:
    enabled: false
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:43.138.177.53}:${POSTGRES_PORT:5432}/${POSTGRES_DB:meis}
    username: ${POSTGRES_USER:med}
    password: ${POSTGRES_PASSWORD:med123456}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
meis:
  jwt:
    secret: meis-saas-jwt-secret-change-in-production-256bits
    issuer: meis-saas
    expiration-ms: 86400000
  # тЙ«С┐Ат░ЈуеІт║ЈУ«бжўЁТХѕТЂ»№╝џтАФтЁЦтљ?/notification/wx/bind ТЅЇтЈ»ТЇ?openid
  wechat-mp:
    app-id: ${WECHAT_MP_APP_ID:}
    app-secret: ${WECHAT_MP_APP_SECRET:}
management:
  endpoints:
    web:
      exposure:
        include: health,info